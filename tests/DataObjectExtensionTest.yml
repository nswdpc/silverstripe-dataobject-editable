SilverStripe\Security\Group:
  admingroup:
    Title: Administrators
    Code: administrators
  contentpermissionsgroups:
    Title: Content Administrators
    Code: content-administrators-group
SilverStripe\Security\Permission:
  admincode:
    Code: ADMIN
    Group: '=>SilverStripe\Security\Group.admingroup'
  dataobject_view:
    Code: DATAOBJECT_VIEW
    Group: '=>SilverStripe\Security\Group.content-administrators-group'
  dataobject_edit:
    Code: DATAOBJECT_EDIT
    Group: '=>SilverStripe\Security\Group.content-administrators-group'
  dataobject_delete:
    Code: DATAOBJECT_DELETE
    Group: '=>SilverStripe\Security\Group.content-administrators-group'
SilverStripe\Security\Member:
   memberwith:
      Email: with@example.com
      Firstname: With
      Surname: Permissions
      Groups:
        - =>SilverStripe\Security\Group.content-administrators-group
   memberwithout:
      Email: without@example.com
      Firstname: Without
      Surname: Permissions
